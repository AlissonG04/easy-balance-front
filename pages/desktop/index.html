<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Pesagem</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <img src="/assets/logo.png" alt="Logo" class="logo" />
      <button class="logout-button">Sair</button>
    </header>

    <main class="main-content">
      <section class="balanca-container">
        <!-- Balança 01 -->
        <div class="balanca">
          <h2 class="balanca-titulo">Balança 01</h2>
          <div class="botoes">
            <button class="btn iniciar">Iniciar</button>
            <button class="btn parar">Parar</button>
            <button class="btn complemento" data-balanca="1">
              Complemento
            </button>
          </div>
          <div class="peso-display">
            <h3>Peso Atual</h3>
            <div class="peso">0</div>
          </div>
          <h3 class="historico-titulo">Histórico de Pesagens</h3>
          <div class="historico"></div>
        </div>

        <!-- Balança 02 -->
        <div class="balanca">
          <h2 class="balanca-titulo">Balança 02</h2>
          <div class="botoes">
            <button class="btn iniciar">Iniciar</button>
            <button class="btn parar">Parar</button>
            <button class="btn complemento" data-balanca="2">
              Complemento
            </button>
          </div>
          <div class="peso-display">
            <h3>Peso Atual</h3>
            <div class="peso">0</div>
          </div>
          <h3 class="historico-titulo">Histórico de Pesagens</h3>
          <div class="historico"></div>
        </div>
      </section>
    </main>

    <!-- Barra Lateral -->
    <aside class="barra-lateral" id="barra-lateral">
      <h2>Complemento</h2>
      <label for="tara">Tara:</label>
      <input type="number" placeholder="Tara" class="input" id="tara" />
      <label for="liquidoDesejado">Líquido Desejado:</label>
      <input
        type="number"
        placeholder="Líquido Desejado"
        class="input"
        id="liquidoDesejado"
      />
      <label for="bruto">Bruto:</label>
      <input
        type="number"
        placeholder="Bruto"
        class="input"
        id="bruto"
        readonly
      />
      <button class="btn enviar">Enviar Complemento</button>
      <p class="mensagem">
        Solicitação de complemento enviada com sucesso!<br />
        Em instantes alguém virá completar.
      </p>
    </aside>

    <script src="../desktop/app.js"></script>
  </body>
</html>
